publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.1.0
  google_fonts: ^7.0.2
